<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kinect Debug</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #fff; font-family: 'Courier New', monospace; display: flex; height: 100vh; overflow: hidden; }

/* ── Left: skeleton view ── */
#skeletonWrap { flex: 1; position: relative; }
canvas { width: 100%; height: 100%; display: block; }

/* ── Right: status panel ── */
#panel {
  width: 280px; background: #111; border-left: 1px solid #222;
  display: flex; flex-direction: column; overflow: hidden;
}
#status {
  padding: 12px; border-bottom: 1px solid #222; font-size: 11px; line-height: 1.8;
}
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f00; margin-right: 6px; }
.dot.on { background: #0f0; }
#host-row { display: flex; gap: 6px; margin-top: 8px; }
#host-input {
  flex: 1; background: #1a1a1a; border: 1px solid #333; color: #fff;
  padding: 5px 8px; border-radius: 4px; font-family: inherit; font-size: 11px;
}
#connect-btn {
  padding: 5px 10px; background: #1a3a4a; border: 1px solid #0af;
  color: #0af; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px;
}
#connect-btn:hover { background: #0af; color: #000; }

#body-list { flex: 1; overflow-y: auto; padding: 8px; }
.body-card {
  background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px;
  padding: 8px; margin-bottom: 8px; font-size: 10px; line-height: 1.7;
}
.body-card h3 { font-size: 11px; margin-bottom: 4px; }
.joint-row { display: flex; justify-content: space-between; color: #888; }
.joint-row.active { color: #fff; }
.joint-row .name { color: #0af; min-width: 100px; }
.hand-state { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: #222; }

#raw-log {
  height: 120px; background: #050505; border-top: 1px solid #222;
  overflow-y: auto; padding: 8px; font-size: 9px; color: #555; line-height: 1.5;
}
#fps-bar {
  padding: 6px 12px; background: #0a0a0a; border-top: 1px solid #1a1a1a;
  font-size: 10px; color: #444; display: flex; justify-content: space-between;
}
</style>
</head>
<body>

<div id="skeletonWrap">
  <canvas id="c"></canvas>
</div>

<div id="panel">
  <div id="status">
    <div><span class="dot" id="dot"></span><span id="status-text">Disconnected</span></div>
    <div id="host-row">
      <input id="host-input" type="text" value="localhost" placeholder="IP or localhost">
      <button id="connect-btn">Connect</button>
    </div>
  </div>
  <div id="body-list"><div style="color:#444;font-size:11px;padding:8px">No bodies detected</div></div>
  <div id="raw-log"></div>
  <div id="fps-bar">
    <span id="fps-text">-- fps</span>
    <span id="body-count">0 bodies</span>
    <span id="frame-count">0 frames</span>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Resize ──
function resize() {
  canvas.width  = document.getElementById('skeletonWrap').clientWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Skeleton bone connections ──
const BONES = [
  ['Head','Neck'],['Neck','SpineShoulder'],
  ['SpineShoulder','SpineMid'],['SpineMid','SpineBase'],
  ['SpineShoulder','ShoulderLeft'],['ShoulderLeft','ElbowLeft'],
  ['ElbowLeft','WristLeft'],['WristLeft','HandLeft'],['HandLeft','HandTipLeft'],['WristLeft','ThumbLeft'],
  ['SpineShoulder','ShoulderRight'],['ShoulderRight','ElbowRight'],
  ['ElbowRight','WristRight'],['WristRight','HandRight'],['HandRight','HandTipRight'],['WristRight','ThumbRight'],
  ['SpineBase','HipLeft'],['HipLeft','KneeLeft'],['KneeLeft','AnkleLeft'],['AnkleLeft','FootLeft'],
  ['SpineBase','HipRight'],['HipRight','KneeRight'],['KneeRight','AnkleRight'],['AnkleRight','FootRight'],
];

const COLORS = ['#00e5ff','#50fa7b','#ff6b9d','#be78ff','#ffaa00','#ff4444'];
const KEY_JOINTS = ['Head','HandLeft','HandRight','WristLeft','WristRight','SpineShoulder','SpineBase'];

let lastBodies = [];
let frameCount = 0, fps = 0, lastFpsTime = Date.now();

// ── Map Kinect camera space → canvas pixels ──
// Kinect X: roughly -1.1..1.1 m, Y: roughly -0.6..1.2 m, origin at sensor
function kToC(x, y) {
  const W = canvas.width, H = canvas.height;
  const px = (x / 1.2 + 1) * 0.5 * W;   // -1.2..1.2 → 0..W
  const py = (-y / 1.2 + 0.5) * H;       // flip Y, centre vertically
  return { px, py };
}

// ── Draw ──
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Centre cross
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();

  if (!lastBodies.length) {
    ctx.fillStyle = '#333';
    ctx.font = '14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Waiting for Kinect data…', W/2, H/2);
    return;
  }

  lastBodies.forEach((body, bi) => {
    const col = COLORS[bi % COLORS.length];
    const j   = body.joints;

    // Bones
    BONES.forEach(([a, b]) => {
      if (!j[a] || !j[b] || !j[a].tracked || !j[b].tracked) return;
      const pa = kToC(j[a].x, j[a].y);
      const pb = kToC(j[b].x, j[b].y);
      ctx.beginPath();
      ctx.moveTo(pa.px, pa.py);
      ctx.lineTo(pb.px, pb.py);
      ctx.strokeStyle = col + '88';
      ctx.lineWidth = 2;
      ctx.stroke();
    });

    // Joints
    Object.entries(j).forEach(([name, jt]) => {
      if (!jt.tracked) return;
      const { px, py } = kToC(jt.x, jt.y);
      const isKey = KEY_JOINTS.includes(name);
      const r = isKey ? 7 : 4;
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fillStyle = isKey ? col : col + '66';
      ctx.fill();
      if (isKey) {
        ctx.fillStyle = col;
        ctx.font = '9px Courier New';
        ctx.textAlign = 'left';
        ctx.fillText(name.replace('Left','L').replace('Right','R'), px + 9, py + 3);
      }
    });

    // Depth label at head
    if (j['Head'] && j['Head'].tracked) {
      const { px, py } = kToC(j['Head'].x, j['Head'].y);
      ctx.fillStyle = col;
      ctx.font = 'bold 11px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(`P${bi+1}  z=${j['Head'].z.toFixed(2)}m`, px, py - 16);
    }

    // Hand depth indicators
    ['HandLeft','HandRight'].forEach(h => {
      if (!j[h] || !j[h].tracked) return;
      const { px, py } = kToC(j[h].x, j[h].y);
      const depth = j[h].z;
      const intensity = Math.max(0, Math.min(1, 1 - depth / 2.5));
      ctx.beginPath();
      ctx.arc(px, py, 6 + intensity * 20, 0, Math.PI * 2);
      ctx.strokeStyle = col;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = intensity * 0.8;
      ctx.stroke();
      ctx.globalAlpha = 1;
    });
  });
}

// ── Update panel ──
function updatePanel(bodies) {
  const list = document.getElementById('body-list');
  if (!bodies.length) {
    list.innerHTML = '<div style="color:#444;font-size:11px;padding:8px">No bodies detected</div>';
    return;
  }

  list.innerHTML = bodies.map((body, bi) => {
    const col = COLORS[bi % COLORS.length];
    const j   = body.joints;
    const keyJoints = ['Head','SpineShoulder','HandLeft','HandRight','WristLeft','WristRight','HipLeft','HipRight'];
    const rows = keyJoints.map(name => {
      const jt = j[name];
      if (!jt) return '';
      const active = jt.tracked;
      return `<div class="joint-row ${active ? 'active' : ''}">
        <span class="name">${name}</span>
        <span>${active ? `${jt.x.toFixed(3)}, ${jt.y.toFixed(3)}, ${jt.z.toFixed(3)}` : '—'}</span>
      </div>`;
    }).join('');

    return `<div class="body-card" style="border-color:${col}44">
      <h3 style="color:${col}">Body ${bi+1} &nbsp;
        <span class="hand-state">L: ${body.handStateLeft || '?'}</span>
        <span class="hand-state">R: ${body.handStateRight || '?'}</span>
      </h3>
      ${rows}
    </div>`;
  }).join('');
}

// ── Log ──
const logEl = document.getElementById('raw-log');
let logLines = [];
function log(msg) {
  const time = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logLines.push(`[${time}] ${msg}`);
  if (logLines.length > 40) logLines.shift();
  logEl.textContent = logLines.join('\n');
  logEl.scrollTop = logEl.scrollHeight;
}

// ── WebSocket ──
let ws = null;

function connect() {
  const host = document.getElementById('host-input').value.trim() || 'localhost';
  if (ws) { try { ws.close(); } catch(e) {} }

  log(`Connecting to ws://${host}:8765/…`);
  ws = new WebSocket(`ws://${host}:8765/`);

  ws.onopen = () => {
    document.getElementById('dot').classList.add('on');
    document.getElementById('status-text').textContent = `Connected — ${host}:8765`;
    log('✓ Connected');
  };

  ws.onclose = () => {
    document.getElementById('dot').classList.remove('on');
    document.getElementById('status-text').textContent = 'Disconnected — retrying…';
    lastBodies = [];
    log('✗ Disconnected — retrying in 3s');
    setTimeout(connect, 3000);
  };

  ws.onerror = () => log('WebSocket error');

  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch(e) { return; }

    if (msg.type === 'connected') { log('Bridge says: connected'); return; }
    if (msg.type !== 'bodies') return;

    lastBodies = msg.bodies || [];
    frameCount++;

    // FPS
    const now = Date.now();
    if (now - lastFpsTime >= 1000) {
      fps = frameCount;
      frameCount = 0;
      lastFpsTime = now;
      document.getElementById('fps-text').textContent = `${fps} fps`;
    }

    document.getElementById('body-count').textContent = `${lastBodies.length} bod${lastBodies.length === 1 ? 'y' : 'ies'}`;
    document.getElementById('frame-count').textContent = `${fps * Math.floor((now - lastFpsTime)/1000 + 1)} frames`;

    updatePanel(lastBodies);

    // Log key events
    if (lastBodies.length) {
      const b = lastBodies[0];
      const h = b.joints['Head'];
      if (h && h.tracked && frameCount % 30 === 0) {
        log(`P1 head: x=${h.x.toFixed(3)} y=${h.y.toFixed(3)} z=${h.z.toFixed(3)}m`);
      }
    }
  };
}

document.getElementById('connect-btn').onclick = () => connect();
connect();

// ── Render loop ──
function loop() {
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>

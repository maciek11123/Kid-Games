<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kinect Debug</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a12; overflow:hidden; font-family:'Courier New',monospace; }
canvas { position:fixed; inset:0; z-index:1; }

#status {
  position:fixed; top:12px; left:12px; z-index:10;
  font-size:11px; color:#888; line-height:1.8;
}
.dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#f00; margin-right:6px; vertical-align:middle; }
.dot.on { background:#0f0; }

#panel {
  position:fixed; top:12px; right:12px; z-index:10;
  background:rgba(0,0,0,0.8); border:1px solid #222;
  border-radius:8px; padding:10px 12px; font-size:10px;
  color:#666; width:180px; line-height:2;
}
#panel b { color:#0af; }

/* QR overlay */
#qrOverlay {
  position:fixed; inset:0; z-index:30;
  background:rgba(0,0,0,0.92);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
}
#qrOverlay h2 { color:#fff; font-size:16px; font-family:system-ui; }
#qrOverlay p  { color:#888; font-size:12px; font-family:system-ui; }

#qrUrl { color:#0af; font-size:11px; font-family:monospace; }
#btnDismiss {
  padding:10px 24px; background:#0af1; border:1px solid #0af;
  color:#0af; border-radius:8px; cursor:pointer; font-size:13px;
  font-family:system-ui;
}

/* Auto-fit overlay */
#autofit {
  position:fixed; inset:0; z-index:20;
  background:rgba(0,0,0,0.88);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  color:#fff; text-align:center; gap:12px;
}
#autofit h2  { font-size:20px; }
#autofit p   { font-size:12px; color:#888; max-width:300px; line-height:1.6; }
#countdown   { font-size:56px; font-weight:900; color:#0f0; }
#fitResult   { font-size:13px; color:#0f0; min-height:20px; }

#hostRow { position:fixed; bottom:12px; left:12px; z-index:10; display:flex; gap:6px; }
#host-input { background:#111; border:1px solid #333; color:#fff; padding:5px 8px; border-radius:4px; font-size:11px; width:130px; font-family:inherit; }
#connect-btn { padding:5px 10px; background:#0af1; border:1px solid #0af; color:#0af; border-radius:4px; cursor:pointer; font-size:11px; }
#btn-qr { padding:5px 10px; background:#1a1; border:1px solid #0f0; color:#0f0; border-radius:4px; cursor:pointer; font-size:11px; }
#btn-mirror { padding:5px 10px; background:#1a1a00; border:1px solid #880; color:#aa0; border-radius:4px; cursor:pointer; font-size:11px; }
#btn-mirror.active { background:#332200; border-color:#fa0; color:#fa0; }

#log { position:fixed; bottom:12px; right:12px; z-index:10; font-size:9px; color:#333; line-height:1.5; width:280px; text-align:right; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="status">
  <div><span class="dot" id="dot"></span><span id="stext">Disconnected</span></div>
  <div id="bodyCount">Bodies: 0</div>
  <div id="fpsText">-- fps</div>
</div>

<div id="panel">
  <div><b>Kinect Debug</b></div>
  <div id="calDisplay">No calibration</div>
</div>

<!-- QR overlay — hidden by default now -->
<div id="qrOverlay" style="display:none">
  <h2>📱 Scan to open remote</h2>
  <div id="qrCanvas" style="width:200px;height:200px;background:#fff;border-radius:8px;padding:8px;flex-shrink:0;"></div>
  <div id="qrUrl"></div>
  <p id="qrNote">Make sure your phone is on the same WiFi</p>
  <button id="btnDismiss">Got it — dismiss</button>
</div>

<!-- Auto-fit overlay -->
<div id="autofit">
  <div style="font-size:50px">🧍</div>
  <h2>Stand in position</h2>
  <p>Hold still — capturing in…</p>
  <div id="countdown">3</div>
  <div id="fitResult"></div>
</div>

<div id="hostRow">
  <input id="host-input" type="text" value="localhost" placeholder="Kinect bridge host">
  <button id="connect-btn">Connect</button>
  <button id="btn-mirror">⬜ Front</button>
  <button id="btn-qr">📱 QR</button>
</div>

<div id="log"></div>

<script>
// ── Log (declared first so connect() can use it on load) ──
const logLines=[];
function log(msg){
  const t=new Date().toLocaleTimeString('en',{hour12:false});
  logLines.push('['+t+'] '+msg);
  if(logLines.length>5)logLines.shift();
  const el=document.getElementById('log');
  if(el) el.textContent=logLines.join('\n');
}

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// ── Cal ──
let cal = { xOff:0, yOff:0, xSc:1, ySc:1, tilt:0 };
let mirrorX = false;

function applyKToC(x, y) {
  const rad = cal.tilt * Math.PI / 180;
  const cos = Math.cos(rad), sin = Math.sin(rad);
  let rx    = x*cos - y*sin;
  const ry  = x*sin + y*cos;
  if (mirrorX) rx = -rx;
  const nx  = ((rx + cal.xOff) * cal.xSc) / 1.2;
  const ny  = ((-ry + cal.yOff) * cal.ySc) / 1.2;
  return { px:(nx+1)*0.5*W, py:(ny+0.5)*H };
}

// ── Bones ──
const BONES=[
  ['Head','Neck'],['Neck','SpineShoulder'],
  ['SpineShoulder','SpineMid'],['SpineMid','SpineBase'],
  ['SpineShoulder','ShoulderLeft'],['ShoulderLeft','ElbowLeft'],['ElbowLeft','WristLeft'],['WristLeft','HandLeft'],
  ['SpineShoulder','ShoulderRight'],['ShoulderRight','ElbowRight'],['ElbowRight','WristRight'],['WristRight','HandRight'],
  ['SpineBase','HipLeft'],['HipLeft','KneeLeft'],['KneeLeft','AnkleLeft'],['AnkleLeft','FootLeft'],
  ['SpineBase','HipRight'],['HipRight','KneeRight'],['KneeRight','AnkleRight'],['AnkleRight','FootRight'],
];

const TARGET={
  Head:[0.5,0.12],Neck:[0.5,0.20],SpineShoulder:[0.5,0.25],
  ShoulderLeft:[0.38,0.25],ShoulderRight:[0.62,0.25],
  SpineMid:[0.5,0.42],SpineBase:[0.5,0.55],
  HipLeft:[0.44,0.55],HipRight:[0.56,0.55],
  KneeLeft:[0.43,0.72],KneeRight:[0.57,0.72],
  AnkleLeft:[0.43,0.88],AnkleRight:[0.57,0.88],
};

let lastBodies=[], fps=0, frameCount=0, lastFpsTime=Date.now();

function drawTarget(){
  ctx.globalAlpha=0.13; ctx.strokeStyle='#0af'; ctx.lineWidth=2;
  BONES.forEach(([a,b])=>{
    if(!TARGET[a]||!TARGET[b])return;
    ctx.beginPath();
    ctx.moveTo(TARGET[a][0]*W,TARGET[a][1]*H);
    ctx.lineTo(TARGET[b][0]*W,TARGET[b][1]*H);
    ctx.stroke();
  });
  ctx.beginPath(); ctx.arc(TARGET.Head[0]*W,TARGET.Head[1]*H,22,0,Math.PI*2);
  ctx.strokeStyle='#0af'; ctx.stroke();
  ctx.globalAlpha=1;
}

function drawSkeleton(bodies){
  bodies.forEach((body,bi)=>{
    const j=body.joints, col='#00e5ff';
    BONES.forEach(([a,b])=>{
      if(!j[a]||!j[b]||!j[a].tracked||!j[b].tracked)return;
      const pa=applyKToC(j[a].x,j[a].y), pb=applyKToC(j[b].x,j[b].y);
      ctx.beginPath(); ctx.moveTo(pa.px,pa.py); ctx.lineTo(pb.px,pb.py);
      ctx.strokeStyle=col+'aa'; ctx.lineWidth=2; ctx.stroke();
    });
    Object.entries(j).forEach(([name,jt])=>{
      if(!jt.tracked)return;
      const {px,py}=applyKToC(jt.x,jt.y);
      const isKey=['Head','HandLeft','HandRight','SpineBase','SpineShoulder'].includes(name);
      ctx.beginPath(); ctx.arc(px,py,isKey?7:4,0,Math.PI*2);
      ctx.fillStyle=isKey?col:col+'66'; ctx.fill();
    });
    if(j.Head&&j.Head.tracked){
      const {px,py}=applyKToC(j.Head.x,j.Head.y);
      ctx.fillStyle=col; ctx.font='bold 11px Courier New';
      ctx.textAlign='center';
      ctx.fillText('P'+(bi+1)+'  z='+j.Head.z.toFixed(2)+'m',px,py-16);
    }
  });
}

// ── Auto-fit ──
function startAutoFit(){
  const el=document.getElementById('autofit');
  el.style.display='flex';
  document.getElementById('fitResult').textContent='';
  let count=3;
  document.getElementById('countdown').textContent=count;
  const tick=setInterval(()=>{
    count--;
    if(count>0){ document.getElementById('countdown').textContent=count; }
    else{
      clearInterval(tick);
      document.getElementById('countdown').textContent='📸';
      if(!lastBodies.length){
        document.getElementById('fitResult').textContent='❌ No body — try again';
        setTimeout(()=>el.style.display='none',2000); return;
      }
      autoFit(lastBodies[0]);
    }
  },1000);
}

function autoFit(body){
  const j=body.joints;
  if(!j.Head||!j.Head.tracked||!j.SpineBase||!j.SpineBase.tracked){
    document.getElementById('fitResult').textContent='❌ Need full body visible';
    setTimeout(()=>document.getElementById('autofit').style.display='none',2000); return;
  }
  const hx=j.Head.x,hy=j.Head.y,bx=j.SpineBase.x,by=j.SpineBase.y;
  cal.tilt = -Math.atan2(hx-bx, hy-by)*180/Math.PI;
  function rot(x,y){ const r=cal.tilt*Math.PI/180,c=Math.cos(r),s=Math.sin(r); return {x:x*c-y*s,y:x*s+y*c}; }
  const rH=rot(hx,hy), rB=rot(bx,by);
  cal.xOff = -((rH.x+rB.x)/2);
  cal.yOff =  (rH.y+rB.y)/2;
  const bodyH=Math.abs(rH.y-rB.y);
  const sc=bodyH>0?(0.75*1.2)/bodyH:1;
  cal.xSc=sc; cal.ySc=sc;

  updateCalDisplay();
  // Send cal result back to the remote via the bridge
  broadcastCal();
  document.getElementById('fitResult').textContent='✓ Done! tilt='+cal.tilt.toFixed(1)+'° sc='+sc.toFixed(2);
  log('Auto-fit done');
  setTimeout(()=>document.getElementById('autofit').style.display='none',2000);
}

function updateCalDisplay(){
  document.getElementById('calDisplay').innerHTML=
    'tilt: <b>'+cal.tilt.toFixed(1)+'°</b><br>'+
    'xOff: <b>'+cal.xOff.toFixed(2)+'</b>  yOff: <b>'+cal.yOff.toFixed(2)+'</b><br>'+
    'scale: <b>'+cal.xSc.toFixed(2)+'</b>';
}

// Send cal back through the single ws connection so bridge broadcasts to all clients
function broadcastCal(){
  if(ws && ws.readyState===1){
    ws.send(JSON.stringify({ type:'cal-result', cal: cal, mirrorX: mirrorX }));
    log('Cal sent to remote');
  }
}

// ── Mirror toggle ──
function updateMirrorBtn(){
  const btn = document.getElementById('btn-mirror');
  if(mirrorX){
    btn.textContent = '🔄 Back';
    btn.classList.add('active');
  } else {
    btn.textContent = '⬜ Front';
    btn.classList.remove('active');
  }
}
document.getElementById('btn-mirror').onclick = () => {
  mirrorX = !mirrorX;
  updateMirrorBtn();
  broadcastCal();
};

// ── Draw loop ──
function draw(){
  ctx.fillStyle='#0a0a12'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.strokeStyle='rgba(255,255,255,0.06)';
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
  drawTarget();
  if(!lastBodies.length){
    ctx.fillStyle='#222'; ctx.font='14px Courier New'; ctx.textAlign='center';
    ctx.fillText('Waiting for body…',W/2,H/2);
  } else drawSkeleton(lastBodies);
}
function loop(){ draw(); requestAnimationFrame(loop); }
loop();

// ── Single WebSocket connection ──
let ws, reconnectTimer;

function connect(){
  const host=document.getElementById('host-input').value.trim()||'localhost';
  clearTimeout(reconnectTimer);
  if(ws){ try{ws.close();}catch(e){} ws=null; }
  log('Connecting to '+host+'…');

  ws = new WebSocket('ws://'+host+':8766/');

  ws.onopen = () => {
    document.getElementById('dot').classList.add('on');
    document.getElementById('stext').textContent='Kinect: '+host;
    log('Connected');
  };

  ws.onclose = () => {
    document.getElementById('dot').classList.remove('on');
    document.getElementById('stext').textContent='Disconnected';
    lastBodies=[];
    log('Disconnected — retry in 3s');
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    // onclose will fire next, handles retry
  };

  ws.onmessage = (evt) => {
    let msg; try{ msg=JSON.parse(evt.data); }catch(e){ return; }

    // Remote → debug: commands from phone
    if(msg.type==='remote-autofit'){ startAutoFit(); return; }
    if(msg.type==='remote-cal'){ Object.assign(cal, msg.cal); updateCalDisplay(); return; }
    if(msg.type==='remote-reset'){ cal={xOff:0,yOff:0,xSc:1,ySc:1,tilt:0}; updateCalDisplay(); return; }
    if(msg.type==='remote-mirror'){ mirrorX = !!msg.mirrorX; updateMirrorBtn(); return; }

    // Skeleton data from Kinect
    if(msg.type!=='bodies') return;
    lastBodies = msg.bodies||[];
    frameCount++;
    const now=Date.now();
    if(now-lastFpsTime>=1000){ fps=frameCount; frameCount=0; lastFpsTime=now; document.getElementById('fpsText').textContent=fps+' fps'; }
    document.getElementById('bodyCount').textContent='Bodies: '+lastBodies.length;
  };
}

document.getElementById('connect-btn').onclick = connect;
connect();

// ── QR Code (drawn locally — no external request) ──
function showQR(){
  const ip   = document.getElementById('host-input').value.trim();
  const note = document.getElementById('qrNote');
  const box  = document.getElementById('qrCanvas');

  // Always clear previous QR
  box.innerHTML = '';

  if(!ip || ip === 'localhost' || ip === '127.0.0.1'){
    note.textContent = "⚠ Enter the PC's real LAN IP above first, then click QR";
    note.style.color = '#f80';
    document.getElementById('qrUrl').textContent = '';
    return;
  }

  note.textContent = 'Make sure your phone is on the same WiFi';
  note.style.color = '';

  const url = 'https://maciek11123.github.io/Kid-Games/debug-remote.html?host='+encodeURIComponent(ip);
  document.getElementById('qrUrl').textContent = url;

  new QRCode(box, {
    text: url,
    width: 184,
    height: 184,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

document.getElementById('btn-qr').onclick=()=>{
  showQR();
  document.getElementById('qrOverlay').style.display='flex';
};
document.getElementById('btnDismiss').onclick=()=>{
  document.getElementById('qrOverlay').style.display='none';
};

</script>
</body>
</html>
